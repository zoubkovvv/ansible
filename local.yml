---

- hosts: local
  become: true

  tasks:

    - name: Install apache2 server
      apt: 
        name: apache2

    - name: Start the apache2 services 
      service:
        name: apache2
        state: started
        enabled: true

  tasks:

    - name: Copy index.html
      copy:
        src: index.html
        dest: /var/www/html/index.html

